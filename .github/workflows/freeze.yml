name: 🎮 FreezeHost 自动续期
on:
  schedule:
    - cron: '0 8 */1 * *' 
  workflow_dispatch:
jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npx playwright install chromium --with-deps

      - name: 🛡️ 启动内部 GOST 代理转发
        if: ${{ secrets.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          wget -qO- https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz | gzip -d > gost
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > /dev/null 2>&1 &
          sleep 3

      - name: 🚀 运行续期脚本
        env:
          DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }}
          TG_BOT:          ${{ secrets.TG_BOT }}
          DISCORD_2FA:     ${{ secrets.DISCORD_2FA }}
          GOST_PROXY:      http://127.0.0.1:8080
        run: npx playwright test tests/freeze.spec.js
